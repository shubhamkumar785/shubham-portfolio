<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Shubham</title>
    <meta name="description" content="Contact Shubham for Java backend development, cloud engineering, and project collaboration.">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="scale.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="contact-page">
    <header class="header">
        <div class="nav-container">
            <a class="logo-bottom" href="index.html">Shubham</a>
            <nav class="nav-pill" aria-label="Primary navigation">
                <a href="index.html#services">Service</a>
                <a href="contact.html">Contact</a>
                <a href="resume.pdf" target="_blank" rel="noopener noreferrer">Resume</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact" id="contact">
            <div class="contact-container">
                <div class="contact-header">
                    <h2>LET'S CONNECT</h2>
                    <p>Ready to bring your ideas to life? Let's discuss your project and create something amazing
                        together.</p>
                </div>

                <div class="contact-content">
                    <div class="contact-card form-card">
                        <h3>Let's Work Together</h3>
                        <p>Hi, I'm Shubham! Fill out the form below to collaborate on your next project.</p>

                        <form id="contact-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="first-name">First Name</label>
                                    <input type="text" id="first-name" name="first_name" placeholder="John" required>
                                </div>

                                <div class="form-group">
                                    <label for="last-name">Last Name</label>
                                    <input type="text" id="last-name" name="last_name" placeholder="Doe" required>
                                </div>

                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                                </div>

                                <div class="form-group">
                                    <label for="phone">Phone</label>
                                    <input type="text" id="phone" name="phone" placeholder="+91 XXXXXXXX">
                                </div>
                            </div>

                            <div class="form-group full">
                                <label for="message">Your Message</label>
                                <textarea id="message" name="message" rows="5" placeholder="Type your message..."
                                    required></textarea>
                            </div>

                            <div class="form-buttons">
                                <button class="btn btn-send">Send</button>
                                <button class="btn btn-reset">Reset</button>
                            </div>
                            <div id="form-status" class="form-status"></div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
